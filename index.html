<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gītā Dice for Kindle</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Georgia, serif;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            font-size: 16px;
            margin-bottom: 40px;
            color: #333333;
        }
        .btn {
            background-color: #000000;
            color: #ffffff;
            border: 3px solid #000000;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:active {
            background-color: #ffffff;
            color: #000000;
        }
        /* Style for the original creator attribution */
        .credit {
            margin-top: 50px;
            font-size: 12px;
            color: #666666;
            font-style: italic;
        }
        .credit a {
            color: #000000;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gītā Dice</h1>
        <p>Roll to open a random Bhagavad-gītā verse on Vedabase.</p>
        
        <button class="btn" onclick="rollGitaDice()">Roll Dice 🎲</button>
        
        <div class="credit">
            Inspired by the original <a href="https://github.com/tomviljo/vedadice" target="_blank">Veda Dice</a> by tomviljo
        </div>
    </div>

    <script>
        // Total verses in each of the 18 chapters of the Bhagavad-gita
        const gitaVerseCount = {
            1: 47,  2: 72,  3: 43,  4: 42,  5: 29,  6: 47,
            7: 30,  8: 28,  9: 34, 10: 42, 11: 55, 12: 20,
            13: 35, 14: 27, 15: 20, 16: 24, 17: 28, 18: 78
        };

        function rollGitaDice() {
            // 1. Pick a random chapter between 1 and 18
            const chapters = Object.keys(gitaVerseCount);
            const randomChapter = chapters[Math.floor(Math.random() * chapters.length)];
            
            // 2. Get the max verses for that specific chapter and pick a random verse
            const maxVerses = gitaVerseCount[randomChapter];
            const randomVerse = Math.floor(Math.random() * maxVerses) + 1;
            
            // 3. Construct the official Vedabase URL structure for BG
            // Format: https://vedabase.io/en/library/bg/CHAPTER/VERSE/
            const finalUrl = "https://vedabase.io/en/library/bg/" + randomChapter + "/" + randomVerse + "/";
            
            // 4. Redirect the Kindle browser
            window.location.href = finalUrl;
        }
    </script>

</body>
</html>
